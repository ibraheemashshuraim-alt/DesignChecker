<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gemini Debugging Test (v1beta)</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background: #0f172a; color: white; }
        .card { background: #1e293b; padding: 20px; border-radius: 10px; border: 1px solid #334155; }
        pre { background: #020617; color: #10b981; padding: 15px; border-radius: 5px; overflow: auto; min-height: 150px; white-space: pre-wrap; }
        button { background: #00f0ff; color: #0f172a; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #status { margin: 10px 0; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Gemini Full Debugging Test</h2>
        <p>This test logs the ENTIRE response object to the <b>Console (F12)</b>.</p>
        
        <input type="file" id="imageInput" accept="image/*">
        <br><br>
        <button id="testBtn">RUN DEBUG TEST</button>

        <div id="status">Status: Ready.</div>
        <h3>Console Output Preview:</h3>
        <pre id="output">Check F12 for full detailed response object...</pre>
    </div>

    <script>
        const apiKey = "AIzaSyAGtDXyTMf-L6R7_bisYAu8AJlILCnLMRg";

        document.getElementById('testBtn').addEventListener('click', async () => {
            const file = document.getElementById('imageInput').files[0];
            if (!file) return alert("Select an image first.");

            const status = document.getElementById('status');
            const output = document.getElementById('output');

            status.innerText = "Status: Calling Gemini API...";
            output.innerText = "Check Console (F12) for real-time logs.";

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                // Ensure PURE Base64 (remove prefix)
                const base64Data = reader.result.split(',')[1];
                const mimeType = file.type;

                const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

                const payload = {
                    contents: [{
                        parts: [
                            { text: "Briefly analyze this design." },
                            { 
                                inline_data: { 
                                    mime_type: mimeType, 
                                    data: base64Data 
                                } 
                            }
                        ]
                    }]
                };

                try {
                    console.log("[DEBUG] Sending Payload:", payload);
                    
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    console.log("[DEBUG] Raw Response Object:", response);
                    
                    const data = await response.json();
                    console.log("[DEBUG] JSON Response Data:", data);

                    if (response.ok) {
                        status.innerText = "Status: Success!";
                        output.innerText = data.candidates[0].content.parts[0].text;
                    } else {
                        status.innerText = `Status: API Error ${response.status}`;
                        output.innerText = JSON.stringify(data, null, 2);
                    }

                } catch (err) {
                    console.error("[DEBUG] Fetch Error:", err);
                    status.innerText = "Status: Fetch Failed";
                    output.innerText = err.message;
                }
            };
        });
    </script>
</body>
</html>
